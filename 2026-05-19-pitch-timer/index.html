<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pitch Timer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1115;
    color: #e8e8ea;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #1a1d24;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  h1 { font-size: 1.2rem; font-weight: 500; color: #9aa0a6; margin-bottom: 32px; letter-spacing: 0.5px; }
  .time {
    font-size: 5rem;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    margin-bottom: 24px;
    transition: color 0.3s;
  }
  .progress {
    height: 6px;
    background: #2a2d34;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 32px;
  }
  .bar { height: 100%; width: 100%; background: #4ade80; transition: width 0.5s linear, background 0.3s; }
  .presets { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; justify-content: center; }
  .presets button {
    background: #2a2d34; color: #e8e8ea; border: none; padding: 10px 16px;
    border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: background 0.2s;
  }
  .presets button:hover { background: #353944; }
  .presets button.active { background: #4ade80; color: #0f1115; font-weight: 600; }
  .controls { display: flex; gap: 12px; }
  .controls button {
    flex: 1; padding: 14px; border: none; border-radius: 10px;
    font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  }
  .start { background: #4ade80; color: #0f1115; }
  .reset { background: #2a2d34; color: #e8e8ea; }
  .controls button:hover { opacity: 0.85; }
  .warn { color: #fbbf24; }
  .crit { color: #ef4444; }
</style>
</head>
<body>
  <div class="card">
    <h1>PITCH TIMER</h1>
    <div class="time" id="time">3:00</div>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="presets" id="presets">
      <button data-sec="60">1 min</button>
      <button data-sec="180" class="active">3 min</button>
      <button data-sec="300">5 min</button>
      <button data-sec="600">10 min</button>
    </div>
    <div class="controls">
      <button class="start" id="start">Start</button>
      <button class="reset" id="reset">Reset</button>
    </div>
  </div>

<script>
  let duration = 180;
  let remaining = 180;
  let interval = null;
  let running = false;

  const timeEl = document.getElementById('time');
  const barEl = document.getElementById('bar');
  const startBtn = document.getElementById('start');
  const resetBtn = document.getElementById('reset');
  const presets = document.getElementById('presets');

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  function render() {
    timeEl.textContent = fmt(remaining);
    const pct = (remaining / duration) * 100;
    barEl.style.width = pct + '%';

    timeEl.classList.remove('warn', 'crit');
    if (remaining <= 10) {
      timeEl.classList.add('crit');
      barEl.style.background = '#ef4444';
    } else if (remaining <= 30) {
      timeEl.classList.add('warn');
      barEl.style.background = '#fbbf24';
    } else {
      barEl.style.background = '#4ade80';
    }
  }

  function beep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 800;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start();
    osc.stop(ctx.currentTime + 0.5);
  }

  function tick() {
    remaining--;
    render();
    if (remaining <= 0) {
      clearInterval(interval);
      running = false;
      startBtn.textContent = 'Start';
      beep();
      setTimeout(beep, 600);
      setTimeout(beep, 1200);
    }
  }

  startBtn.addEventListener('click', () => {
    if (running) {
      clearInterval(interval);
      running = false;
      startBtn.textContent = 'Resume';
    } else {
      if (remaining <= 0) remaining = duration;
      interval = setInterval(tick, 1000);
      running = true;
      startBtn.textContent = 'Pause';
    }
  });

  resetBtn.addEventListener('click', () => {
    clearInterval(interval);
    running = false;
    remaining = duration;
    startBtn.textContent = 'Start';
    render();
  });

  presets.addEventListener('click', (e) => {
    if (e.target.tagName !== 'BUTTON') return;
    [...presets.children].forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    duration = parseInt(e.target.dataset.sec);
    remaining = duration;
    clearInterval(interval);
    running = false;
    startBtn.textContent = 'Start';
    render();
  });

  render();
</script>
</body>
</html>
